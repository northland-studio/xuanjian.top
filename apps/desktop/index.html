<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玄剑公会</title>
    <link rel="stylesheet" href="/src/styles.css">
</head>
<body>
    <div class="titlebar" data-tauri-drag-region>
        <div class="titlebar-drag" data-tauri-drag-region>
            <img src="/src/assets/icon.png" alt="玄剑" class="titlebar-icon">
            <span class="titlebar-title">玄剑公会</span>
        </div>
        <div class="titlebar-controls">
            <button class="titlebar-btn" id="titlebar-minimize" type="button">
                <svg viewBox="0 0 24 24" width="12" height="12">
                    <path fill="currentColor" d="M19 13H5v-2h14v2z"/>
                </svg>
            </button>
            <button class="titlebar-btn" id="titlebar-maximize" type="button">
                <svg viewBox="0 0 24 24" width="12" height="12">
                    <path fill="currentColor" d="M4 4h16v16H4V4zm2 2v12h12V6H6z"/>
                </svg>
            </button>
            <button class="titlebar-btn titlebar-close" id="titlebar-close" type="button">
                <svg viewBox="0 0 24 24" width="12" height="12">
                    <path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12 19 6.41z"/>
                </svg>
            </button>
        </div>
    </div>
    
    <div id="app">
        <nav class="sidebar">
            <div class="sidebar-header">
                <img src="/src/assets/icon.png" alt="玄剑" class="logo">
                <span class="brand-name">玄剑公会</span>
            </div>
            
            <div class="nav-menu">
                <button class="nav-item active" data-page="home">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor" d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
                    </svg>
                    <span>首页</span>
                </button>
                <button class="nav-item" data-page="daily">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor" d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
                    </svg>
                    <span>日报</span>
                </button>
                <button class="nav-item" data-page="decision">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor" d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
                    </svg>
                    <span>决策</span>
                </button>
                <button class="nav-item" data-page="forum">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor" d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
                    </svg>
                    <span>贴吧</span>
                </button>
                <button class="nav-item" data-page="stock">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor" d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-7.09 7.97-4-4L2 16.99z"/>
                    </svg>
                    <span>股市</span>
                </button>
                <button class="nav-item" data-page="shop">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor" d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/>
                    </svg>
                    <span>商城</span>
                </button>
                <button class="nav-item" data-page="rankings">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor" d="M7.5 21H2V9h5.5v12zm7.25-18h-5.5v18h5.5V3zM22 11h-5.5v10H22V11z"/>
                    </svg>
                    <span>排行榜</span>
                </button>
                <button class="nav-item" data-page="checkin">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor" d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM9 10H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2zm-8 4H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2z"/>
                    </svg>
                    <span>签到</span>
                </button>
                <button class="nav-item" data-page="inventory">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor" d="M20 2H4c-1 0-2 .9-2 2v3.01c0 .72.43 1.34 1 1.69V20c0 1.1 1.1 2 2 2h14c.9 0 2-.9 2-2V8.7c.57-.35 1-.97 1-1.69V4c0-1.1-1-2-2-2zm-5 12H9v-2h6v2zm5-7H4V4h16v3z"/>
                    </svg>
                    <span>仓库</span>
                </button>
                <button class="nav-item" data-page="claims">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor" d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/>
                    </svg>
                    <span>申报</span>
                </button>
                <button class="nav-item" data-page="admin" id="nav-admin" style="display:none;">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor" d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/>
                    </svg>
                    <span>管理后台</span>
                </button>
            </div>

            <div class="sidebar-footer">
                <button class="write-btn" id="write-btn">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path fill="currentColor" d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
                    </svg>
                    发布内容
                </button>
                
                <div class="user-card" id="user-card">
                    <div class="user-avatar-wrapper" id="user-avatar-wrapper">
                        <img src="" class="user-avatar" id="user-avatar" style="display:none;">
                        <div class="user-avatar-placeholder" id="avatar-placeholder">
                            <svg viewBox="0 0 24 24" width="24" height="24">
                                <path fill="currentColor" d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                            </svg>
                        </div>
                    </div>
                    <div class="user-info" id="user-info">
                        <span class="user-name" id="user-display-name">未登录</span>
                        <span class="user-handle" id="user-handle">@guest</span>
                    </div>
                </div>
            </div>
        </nav>

        <main class="main-content">
            <header class="content-header">
                <div class="header-left">
                    <h1 class="page-title" id="page-title">首页</h1>
                    <div class="header-search">
                        <svg viewBox="0 0 24 24" width="18" height="18">
                            <path fill="currentColor" d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                        </svg>
                        <input type="text" id="header-search-input" placeholder="搜索帖子...">
                    </div>
                </div>
                <div class="header-actions">
                    <button class="icon-btn" id="notification-btn" title="通知">
                        <svg viewBox="0 0 24 24" width="20" height="20">
                            <path fill="currentColor" d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2zm-2 1H8v-6c0-2.48 1.51-4.5 4-4.5s4 2.02 4 4.5v6z"/>
                        </svg>
                        <span class="notification-badge" id="header-notification-badge" style="display: none;">0</span>
                    </button>
                    <button class="icon-btn" id="theme-toggle" title="切换主题">
                        <svg class="icon-moon" viewBox="0 0 24 24" width="20" height="20">
                            <path fill="currentColor" d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/>
                        </svg>
                        <svg class="icon-sun" viewBox="0 0 24 24" width="20" height="20">
                            <path fill="currentColor" d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/>
                        </svg>
                    </button>
                    <button class="icon-btn" id="refresh-btn" title="刷新">
                        <svg viewBox="0 0 24 24" width="20" height="20">
                            <path fill="currentColor" d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                        </svg>
                    </button>
                </div>
            </header>

            <div class="content-body" id="content-body">
                <div class="loading-spinner"></div>
            </div>
        </main>
    </div>

    <div class="modal" id="login-modal">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">登录</h2>
                <button class="modal-close" id="login-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="login-username" placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="login-password" placeholder="请输入密码">
                </div>
                <button class="btn-primary" id="login-submit">登录</button>
                <p class="form-footer">
                    还没有账号？<a href="#" id="go-register">立即注册</a>
                </p>
            </div>
        </div>
    </div>

    <div class="modal" id="register-modal">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">注册</h2>
                <button class="modal-close" id="register-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="register-username" placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label>昵称</label>
                    <input type="text" id="register-nickname" placeholder="请输入昵称">
                </div>
                <div class="form-group">
                    <label>邮箱</label>
                    <div style="display: flex; gap: 8px;">
                        <input type="email" id="register-email" placeholder="请输入邮箱" style="flex: 1;">
                        <button class="btn-secondary" id="send-code-btn" style="white-space: nowrap;">获取验证码</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>验证码</label>
                    <input type="text" id="register-code" placeholder="请输入邮箱验证码" maxlength="6">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="register-password" placeholder="请输入密码">
                </div>
                <div class="form-group">
                    <label>确认密码</label>
                    <input type="password" id="register-confirm" placeholder="请再次输入密码">
                </div>
                <button class="btn-primary" id="register-submit">注册</button>
                <p class="form-footer">
                    已有账号？<a href="#" id="go-login">立即登录</a>
                </p>
            </div>
        </div>
    </div>

    <div class="modal" id="announcement-modal">
        <div class="modal-backdrop"></div>
        <div class="modal-content" style="width: 500px; max-width: 95%;">
            <div class="modal-header">
                <h2 class="modal-title" id="announcement-title">公告</h2>
                <button class="modal-close" id="announcement-close">&times;</button>
            </div>
            <div class="modal-body" id="announcement-body">
            </div>
        </div>
    </div>

    <div class="image-modal" id="image-modal">
        <div class="image-modal-backdrop"></div>
        <img src="" id="image-preview" class="image-preview">
    </div>

    <div class="toast" id="toast"></div>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>

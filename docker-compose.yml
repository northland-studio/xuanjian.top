version: '3.8'

services:
  xuanjian-guild:
    build: .
    container_name: xuanjian-guild-website
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-here}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-xuanjian123}
    volumes:
      # 持久化数据库
      - ./data:/app/data
      # 持久化上传文件
      - ./uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

version: '3.8'

services:
  xuanjian-guild:
    build:
      context: .
      dockerfile: Dockerfile
    image: xuanjian-guild:latest
    container_name: xuanjian-guild-website
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SITE_URL=${SITE_URL}
    volumes:
      # 持久化数据库
      - ./data:/app/data
      # 持久化上传文件
      - ./uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

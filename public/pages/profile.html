<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户档案 - 我的世界玄剑公会</title>
    <link rel="icon" href="/icon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/css/style.css?v=2.0.5">
    <style>
        .profile-container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .profile-header { background: var(--card-bg, white); border-radius: 16px; padding: 40px; text-align: center; box-shadow: var(--shadow, 0 2px 10px rgba(0,0,0,0.08)); margin-bottom: 20px; }
        .profile-avatar { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid #6366f1; margin-bottom: 20px; }
        .profile-name { font-size: 28px; font-weight: 700; margin-bottom: 8px; color: var(--text-color, #1e293b); }
        .profile-username { font-size: 16px; color: var(--text-secondary, #64748b); margin-bottom: 8px; }
        .profile-level { display: inline-block; padding: 6px 16px; background: #6366f1; color: white; border-radius: 20px; font-size: 14px; font-weight: 500; }
        .profile-stats { display: flex; justify-content: center; gap: 40px; margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border-color, #e2e8f0); }
        .profile-stat { text-align: center; }
        .profile-stat-value { font-size: 24px; font-weight: 700; color: #6366f1; }
        .profile-stat-label { font-size: 14px; color: var(--text-secondary, #64748b); margin-top: 4px; }
        .profile-info { background: var(--card-bg, white); border-radius: 16px; padding: 30px; box-shadow: var(--shadow, 0 2px 10px rgba(0,0,0,0.08)); margin-bottom: 20px; }
        .profile-info-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; color: var(--text-color, #1e293b); }
        .profile-info-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border-color, #e2e8f0); }
        .profile-info-item:last-child { border-bottom: none; }
        .profile-info-label { color: var(--text-secondary, #64748b); }
        .profile-info-value { font-weight: 500; color: var(--text-color, #1e293b); }
        .profile-actions { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-top: 24px; }
        .btn { padding: 12px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; transition: all 0.3s; text-align: center; }
        .btn-primary { background: #6366f1; color: white; }
        .btn-primary:hover { background: #4f46e5; }
        .btn-secondary { background: var(--bg-color, #f1f5f9); color: var(--text-secondary, #475569); border: 1px solid var(--border-color, #e2e8f0); }
        .btn-secondary:hover { background: var(--border-color, #e2e8f0); }
        .btn-danger { background: #fee2e2; color: #dc2626; }
        .btn-danger:hover { background: #fecaca; }
        .user-posts { background: var(--card-bg, white); border-radius: 16px; padding: 30px; box-shadow: var(--shadow, 0 2px 10px rgba(0,0,0,0.08)); }
        .user-posts-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; color: var(--text-color, #1e293b); }
        .user-post-item { padding: 16px; border-bottom: 1px solid var(--border-color, #e2e8f0); cursor: pointer; transition: background 0.3s; }
        .user-post-item:hover { background: var(--bg-color, #f8fafc); }
        .user-post-item:last-child { border-bottom: none; }
        .user-post-title { font-weight: 600; margin-bottom: 8px; color: var(--text-color, #1e293b); }
        .user-post-meta { font-size: 13px; color: var(--text-secondary, #64748b); }
        .empty-state { text-align: center; padding: 40px; color: var(--text-secondary, #64748b); }
        
        .checkin-status-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(135deg, #f59e0b 0%, #f97316 100%);
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 16px;
            color: white;
            transition: all 0.3s;
        }
        .checkin-status-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
        }
        .checkin-status-card.checked {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }
        .checkin-status-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 16px;
        }
        .checkin-status-info {
            flex: 1;
        }
        .checkin-status-title {
            font-size: 16px;
            font-weight: 600;
        }
        .checkin-status-detail {
            font-size: 13px;
            opacity: 0.9;
            margin-top: 4px;
        }
        .checkin-status-arrow {
            font-size: 20px;
            opacity: 0.7;
        }
        
        .btn-stock {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
            min-width: 120px;
        }
        .btn-stock:hover {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            transform: translateY(-1px);
        }
        .btn-checkin {
            background: linear-gradient(135deg, #f59e0b 0%, #f97316 100%);
            color: white;
            min-width: 120px;
        }
        .btn-checkin:hover {
            background: linear-gradient(135deg, #d97706 0%, #ea580c 100%);
            transform: translateY(-1px);
        }
        
        /* 汉堡菜单 */
        .hamburger {
            display: none;
            flex-direction: column;
            justify-content: space-around;
            width: 28px;
            height: 24px;
            cursor: pointer;
            z-index: 1001;
        }
        .hamburger span {
            display: block;
            width: 100%;
            height: 3px;
            background: var(--text-color, #1e293b);
            border-radius: 2px;
            transition: all 0.3s;
        }
        .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(6px, 6px); }
        .hamburger.active span:nth-child(2) { opacity: 0; }
        .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(6px, -6px); }
        
        .mobile-menu {
            display: none;
            position: fixed;
            top: 70px;
            left: 0;
            right: 0;
            background: var(--card-bg, white);
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            z-index: 1000;
            flex-direction: column;
            gap: 10px;
        }
        .mobile-menu.active { display: flex; }
        .mobile-menu a {
            padding: 12px 16px;
            color: var(--text-color, #1e293b);
            text-decoration: none;
            border-radius: 8px;
            transition: background 0.3s;
        }
        .mobile-menu a:hover { background: var(--bg-color, #f1f5f9); }
        
        /* 暗色模式适配 */
        [data-theme="dark"] .hamburger span {
            background: #f1f5f9;
        }
        
        [data-theme="dark"] .mobile-menu {
            background: #1e293b;
        }
        
        [data-theme="dark"] .mobile-menu a {
            color: #f1f5f9;
        }
        
        [data-theme="dark"] .mobile-menu a:hover {
            background: #334155;
        }
        
        @media (max-width: 768px) {
            .hamburger { display: flex; }
            .navbar-nav { display: none !important; }
            .profile-container { padding: 12px; }
            .profile-header { padding: 24px; }
            .profile-name { font-size: 24px; }
            .profile-stats { gap: 20px; }
            .profile-stat-value { font-size: 20px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-content">
            <a href="/" class="navbar-brand">
                <img src="/icon.png" alt="玄剑公会" class="navbar-logo">
                <div class="navbar-title">
                    <span class="navbar-title-cn">我的世界玄剑公会</span>
                    <span class="navbar-title-en">Minecraft Xuanjian Guild</span>
                </div>
            </a>
            <div class="navbar-nav">
                <a href="/daily" class="nav-link">日报</a>
                <a href="/decision" class="nav-link">决策</a>
                <a href="/forum" class="nav-link">贴吧</a>
                <a href="/social" class="nav-link">社交媒体</a>
                <div class="nav-user"></div>
            </div>
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>
    
    <div class="mobile-menu" id="mobile-menu">
        <a href="/">首页</a>
        <a href="/daily">日报</a>
        <a href="/decision">决策</a>
        <a href="/forum">贴吧</a>
        <a href="/social">社交媒体</a>
        <a href="/notifications">通知</a>
    </div>

    <main class="main-content">
        <div class="profile-container" id="profile-container">
            <div class="loading"><div class="spinner"></div></div>
        </div>
    </main>

    <script src="/js/common.js?v=2.0.5"></script>
    <script>
        // 汉堡菜单
        document.getElementById('hamburger').addEventListener('click', function() {
            this.classList.toggle('active');
            document.getElementById('mobile-menu').classList.toggle('active');
        });
        
        let isOwnProfile = false;
        let currentUser = null;
        let profileUser = null;
        let checkinStatus = null;

        async function loadProfile() {
            try {
                // 获取当前登录用户
                try {
                    currentUser = await get('/api/auth/me');
                } catch (e) {
                    currentUser = null;
                }
                
                // 获取签到状态
                if (currentUser) {
                    try {
                        checkinStatus = await get('/api/checkin/status');
                    } catch (e) {
                        checkinStatus = null;
                    }
                }

                // 从 URL 获取用户名
                const pathParts = window.location.pathname.split('/');
                const usernameFromUrl = pathParts[pathParts.length - 1];

                if (usernameFromUrl && usernameFromUrl !== 'profile') {
                    // 查看他人档案
                    try {
                        const data = await get(`/api/auth/user/${usernameFromUrl}`);
                        profileUser = data.user;
                        isOwnProfile = currentUser && currentUser.id === profileUser.id;
                    } catch (e) {
                        document.getElementById('profile-container').innerHTML = '<div class="empty-state"><h3>用户不存在</h3><p>该用户可能已被删除或不存在</p></div>';
                        return;
                    }
                } else if (currentUser) {
                    // 查看自己的档案 - 获取完整信息
                    try {
                        const data = await get(`/api/auth/user/${currentUser.username}`);
                        profileUser = data.user;
                        isOwnProfile = true;
                    } catch (e) {
                        // 如果API失败，使用当前用户数据
                        profileUser = currentUser;
                        profileUser.posts_count = 0;
                        profileUser.comments_count = 0;
                        profileUser.likes_count = 0;
                        isOwnProfile = true;
                    }
                } else {
                    // 未登录且没有指定用户
                    window.location.href = '/login';
                    return;
                }

                renderNavbar();
                renderProfile();
                loadUserPosts();
            } catch (error) {
                console.error('加载档案错误:', error);
                document.getElementById('profile-container').innerHTML = '<div class="empty-state"><h3>加载失败</h3><p>请稍后重试</p></div>';
            }
        }

        function renderProfile() {
            const container = document.getElementById('profile-container');
            const levelText = profileUser.level === 2 ? '超级管理员' : profileUser.level === 1 ? '管理员' : '普通成员';
            
            // 构建操作按钮
            let actionButtons = '';
            if (isOwnProfile) {
                // 签到状态卡片
                if (checkinStatus) {
                    actionButtons += `
                        <div class="checkin-status-card ${checkinStatus.todayCheckedIn ? 'checked' : ''}" onclick="window.location.href='/checkin'" style="cursor: pointer;">
                            <div class="checkin-status-icon">
                                <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    ${checkinStatus.todayCheckedIn 
                                        ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>'
                                        : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>'
                                    }
                                </svg>
                            </div>
                            <div class="checkin-status-info">
                                <div class="checkin-status-title">${checkinStatus.todayCheckedIn ? '今日已签到' : '今日未签到'}</div>
                                <div class="checkin-status-detail">连续 ${checkinStatus.continuousDays} 天 · 贡献点 ${profileUser.contribution || 0}</div>
                            </div>
                            <div class="checkin-status-arrow">›</div>
                        </div>
                    `;
                }
                
                actionButtons += `<button class="btn btn-stock" onclick="window.location.href='/stock'">虚拟股票</button>`;
                actionButtons += `<button class="btn btn-checkin" onclick="window.location.href='/checkin'">每日签到</button>`;
                actionButtons += `<button class="btn btn-secondary" onclick="openSettings()">账号设置</button>
                   <button class="btn btn-danger" onclick="logout()">退出登录</button>`;
                // 管理员显示管理按钮
                if (profileUser.level >= 1) {
                    actionButtons += `<button class="btn btn-primary" onclick="window.location.href='/admin'">管理系统</button>`;
                }
            }

            container.innerHTML = `
                <div class="profile-header">
                    <img src="${profileUser.avatar || '/uploads/default-avatar.png'}" class="profile-avatar" id="avatar-preview">
                    <h1 class="profile-name">${profileUser.nickname}</h1>
                    <div class="profile-username">@${profileUser.username}</div>
                    <span class="profile-level">${levelText}</span>
                    <div class="profile-stats">
                        <div class="profile-stat">
                            <div class="profile-stat-value">${profileUser.contribution || 0}</div>
                            <div class="profile-stat-label">贡献值</div>
                        </div>
                        <div class="profile-stat">
                            <div class="profile-stat-value">${profileUser.posts_count || 0}</div>
                            <div class="profile-stat-label">帖子</div>
                        </div>
                        <div class="profile-stat">
                            <div class="profile-stat-value">${profileUser.comments_count || 0}</div>
                            <div class="profile-stat-label">评论</div>
                        </div>
                        <div class="profile-stat">
                            <div class="profile-stat-value">${profileUser.likes_count || 0}</div>
                            <div class="profile-stat-label">获赞</div>
                        </div>
                    </div>
                    <div class="profile-actions">
                        ${actionButtons}
                    </div>
                </div>
                <div class="profile-info">
                    <h3 class="profile-info-title">基本信息</h3>
                    <div class="profile-info-item">
                        <span class="profile-info-label">用户名</span>
                        <span class="profile-info-value">@${profileUser.username}</span>
                    </div>
                    <div class="profile-info-item">
                        <span class="profile-info-label">昵称</span>
                        <span class="profile-info-value">${profileUser.nickname}</span>
                    </div>
                    <div class="profile-info-item">
                        <span class="profile-info-label">邮箱</span>
                        <span class="profile-info-value">${profileUser.email || '未设置'}</span>
                    </div>
                    <div class="profile-info-item">
                        <span class="profile-info-label">注册时间</span>
                        <span class="profile-info-value">${formatDate(profileUser.created_at)}</span>
                    </div>
                </div>
                <div class="user-posts">
                    <h3 class="user-posts-title">最近发布</h3>
                    <div id="user-posts-list">
                        <div class="loading"><div class="spinner"></div></div>
                    </div>
                </div>
            `;
        }

        async function loadUserPosts() {
            try {
                // 使用用户ID获取帖子
                const response = await get('/api/posts?limit=100');
                const allPosts = response.posts || response; // 兼容两种返回格式
                // 使用 == 而不是 === 来比较，因为 ID 可能是字符串或数字
                const userId = profileUser.id;
                const username = profileUser.username;
                const posts = allPosts.filter(p => {
                    const postAuthorId = p.author_id;
                    const postAuthorUsername = p.author_username;
                    return postAuthorId == userId || postAuthorUsername === username;
                }).slice(0, 5);
                
                const container = document.getElementById('user-posts-list');
                
                if (posts.length === 0) {
                    container.innerHTML = '<div class="empty-state">暂无发布内容</div>';
                    return;
                }

                container.innerHTML = posts.map(post => `
                    <div class="user-post-item" onclick="window.location.href='/post/${post.id}'">
                        <div class="user-post-title">${escapeHtml(post.title)}</div>
                        <div class="user-post-meta">${formatDate(post.created_at)} · ${post.type === 'daily' ? '日报' : post.type === 'decision' ? '决策' : '贴吧'}</div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('加载帖子失败:', error);
                document.getElementById('user-posts-list').innerHTML = '<div class="empty-state">加载失败</div>';
            }
        }

        function openSettings() {
            window.location.href = '/settings';
        }

        async function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/';
        }

        document.addEventListener('DOMContentLoaded', loadProfile);
    </script>
</body>
</html>

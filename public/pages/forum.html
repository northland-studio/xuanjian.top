<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <title>е…¬дјҡиҙҙеҗ§ - жҲ‘зҡ„дё–з•ҢзҺ„еү‘е…¬дјҡ</title>
    <link rel="icon" href="/icon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/css/style.css?v=2.0.5">
    <style>
        /* йЎөйқўеӨҙйғЁ */
        .page-header {
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('4.png') center/cover no-repeat;
            color: white;
            padding: 80px 24px 60px;
            text-align: center;
            margin-top: 70px;
        }

        .page-title {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .page-subtitle {
            font-size: 16px;
            opacity: 0.9;
            margin-bottom: 24px;
        }

        .page-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        /* зҪ®йЎ¶е·Ҙе…·ж ?- жӣҝд»ЈеҜјиҲӘж ?*/
        .toolbar-section {
            background: white;
            padding: 12px 24px;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 10;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
        }

        .toolbar-section.scrolled {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }

        .toolbar-container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        /* жҗңзҙўжЎ?*/
        .toolbar-search {
            flex: 1;
            position: relative;
        }

        .toolbar-search input {
            width: 100%;
            padding: 10px 16px;
            padding-right: 40px;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            font-size: 14px;
            transition: var(--transition);
            background: #f8fafc;
        }

        .toolbar-search input:focus {
            outline: none;
            border-color: var(--primary-color);
            background: white;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .toolbar-search button {
            position: absolute;
            right: 4px;
            top: 50%;
            transform: translateY(-50%);
            padding: 6px 10px;
            background: transparent;
            color: var(--text-muted);
            border: none;
            cursor: pointer;
            transition: var(--transition);
        }

        .toolbar-search button:hover {
            color: var(--primary-color);
        }

        /* зӯӣйҖүжҢүй’®з»„ */
        .toolbar-filters {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .toolbar-filter-btn {
            padding: 8px 14px;
            border: 1px solid var(--border-color);
            background: white;
            border-radius: 16px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 13px;
            white-space: nowrap;
            color: var(--text-secondary);
        }

        .toolbar-filter-btn:hover,
        .toolbar-filter-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 1px solid var(--border-color);
            background: white;
            border-radius: 20px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        /* еҶ…е®№еҲ—иЎЁ */
        .content-section {
            padding: 40px 24px;
            min-height: 500px;
        }

        .content-container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* еҶ…е®№еҚЎзүҮ */
        .post-card {
            background: white;
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            transition: var(--transition);
            cursor: pointer;
        }

        .post-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .post-header {
            margin-bottom: 16px;
        }

        .post-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .post-author {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .post-author-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
        }

        .post-author-name {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .post-content {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
        }

        .post-text {
            flex: 1;
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .post-image {
            width: 100px;
            height: 100px;
            border-radius: var(--radius);
            object-fit: cover;
            flex-shrink: 0;
        }

        .post-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
        }

        .post-stats {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .post-stat {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .post-stat svg {
            width: 16px;
            height: 16px;
        }

        .post-date {
            font-size: 13px;
            color: var(--text-muted);
        }

        /* зҪ®йЎ¶ж Үи®° */
        .post-pinned {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 12px;
        }

        /* еҠ иҪҪзҠ¶жҖ?*/
        .loading {
            text-align: center;
            padding: 60px 20px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* з©әзҠ¶жҖ?*/
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* еҲҶйЎө */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 40px;
        }

        .page-btn {
            padding: 8px 16px;
            border: 1px solid var(--border-color);
            background: white;
            border-radius: var(--radius);
            cursor: pointer;
            transition: var(--transition);
        }

        .page-btn:hover,
        .page-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* з§»еҠЁз«ҜйҖӮй…Қ */
        @media (max-width: 768px) {
            .page-title {
                font-size: 28px;
            }

            .post-content {
                flex-direction: column;
            }

            .post-image {
                width: 100%;
                height: 200px;
            }

            .filter-section {
                top: 126px;
            }
        }
    </style>
</head>

    <!-- йЎөйқўеӨҙйғЁ -->
    <header class="page-header">
        <h1 class="page-title">е…¬дјҡиҙҙеҗ§</h1>
        <p class="page-subtitle">е…¬дјҡжҲҗе‘ҳдәӨжөҒи®Ёи®әзҡ„е№іеҸ?/p>
        <div class="page-actions" id="pageActions"></div>
    </header>

    <!-- зҪ®йЎ¶е·Ҙе…·ж ҸпјҲжӣҝд»ЈеҜјиҲӘж Ҹпјү -->
    <section class="toolbar-section" id="toolbar">
        <div class="toolbar-container">
            <div class="toolbar-search">
                <input type="text" id="searchInput" placeholder="жҗңзҙўеё–еӯҗ...">
                <button id="searchBtn">
                    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </button>
            </div>
            <div class="toolbar-filters">
                <button class="toolbar-filter-btn active" data-filter="all">е…ЁйғЁ</button>
                <button class="toolbar-filter-btn" data-filter="discussion">и®Ёи®ә</button>
                <button class="toolbar-filter-btn" data-filter="help">жұӮеҠ©</button>
                <button class="toolbar-filter-btn" data-filter="share">еҲҶдә«</button>

    <!-- еҶ…е®№еҲ—иЎЁ -->
    <section class="content-section">
        <div class="content-container" id="contentContainer">
            <div class="loading">

    <!-- еӣһйЎ¶жҢүй’® -->
    <button class="back-to-top">
        <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"></path>
        </svg>
    </button>

    <script src="/js/common.js?v=2.1.0"></script>
    <script>
        let currentFilter = 'all';
        let currentPage = 1;
        let currentSearch = '';

        // еҲқе§ӢеҢ–йЎөйқ?
        document.addEventListener('DOMContentLoaded', function() {
            initUserStatus();
            loadPosts();
            bindEvents();
        });

        // еҲқе§ӢеҢ–з”ЁжҲ·зҠ¶жҖ?
        function initUserStatus() {
            const user = getCurrentUser();
            const navUser = document.querySelector('.nav-user');
            const pageActions = document.getElementById('pageActions');

            // дё»йўҳеҲҮжҚўжҢүй’®
            const themeBtn = `
                <button class="theme-toggle" onclick="toggleTheme()" title="еҲҮжҚўдё»йўҳ">
                    <svg class="moon-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
                    </svg>
                    <svg class="sun-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
                    </svg>
                </button>
            `;

            // йҖҡзҹҘжҢүй’®
            const notificationBtn = user ? `
                <a href="/notifications" class="nav-notification" title="йҖҡзҹҘ">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
                    </svg>
                    <span class="notification-badge" id="nav-notification-badge" style="display: none;">0</span>
                </a>
            ` : '';

            if (user) {
                // е·Ізҷ»еҪ?
                navUser.innerHTML = themeBtn + notificationBtn + `
                    <a href="/profile">
                        <img src="${user.avatar || '/uploads/default-avatar.png'}" alt="${user.nickname}" class="nav-avatar">
                    </a>
                `;
                
                // еҠ иҪҪжңӘиҜ»йҖҡзҹҘж•?
                loadUnreadNotificationCount();

                // жҳҫзӨәеҸ‘еёғжҢүй’®пјҲжүҖжңүзҷ»еҪ•з”ЁжҲ·йғҪеҸҜд»ҘеҸ‘еёғиҙҙеҗ§пј?
                if (pageActions) {
                    pageActions.innerHTML = `
                        <a href="/editor?type=forum" class="btn btn-primary">
                            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                            </svg>
                            еҸ‘еёғеё–еӯҗ
                        </a>
                    `;
                }
            } else {
                // жңӘзҷ»еҪ?
                navUser.innerHTML = themeBtn + `<a href="/login" class="nav-login-btn">зҷ»еҪ•</a>`;
            }
        }

        // з»‘е®ҡдәӢд»¶
        function bindEvents() {
            // зӯӣйҖүжҢүй’?
            document.querySelectorAll('.toolbar-filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.toolbar-filter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentFilter = this.dataset.filter;
                    currentPage = 1;
                    loadPosts();
                });
            });

            // жҗңзҙў
            const searchInput = document.getElementById('searchInput');
            const searchBtn = document.getElementById('searchBtn');

            searchBtn.addEventListener('click', () => {
                currentSearch = searchInput.value.trim();
                currentPage = 1;
                loadPosts();
            });

            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    currentSearch = searchInput.value.trim();
                    currentPage = 1;
                    loadPosts();
                }
            });

            // ж»ҡеҠЁзӣ‘еҗ¬ - е·Ҙе…·ж Ҹж ·ејҸеҸҳеҢ?
            window.addEventListener('scroll', () => {
                const toolbar = document.getElementById('toolbar');
                if (window.scrollY > 100) {
                    toolbar.classList.add('scrolled');
                } else {
                    toolbar.classList.remove('scrolled');
                }
            });
        }

        // еҠ иҪҪеё–еӯҗеҲ—иЎЁ
        async function loadPosts() {
            const container = document.getElementById('contentContainer');
            container.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>еҠ иҪҪдё?..</p>
                </div>
            `;

            try {
                // жһ„е»әжҹҘиҜўеҸӮж•°
                const params = new URLSearchParams();
                params.append('type', 'forum');
                params.append('page', currentPage);
                params.append('limit', 10);

                if (currentSearch) {
                    params.append('search', currentSearch);
                }

                // и°ғз”ЁAPIиҺ·еҸ–ж•°жҚ®
                const response = await fetch(`/api/posts?${params}`);
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'иҺ·еҸ–ж•°жҚ®еӨұиҙҘ');
                }

                if (data.posts.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8h2a2 2 0 012 2v6a2 2 0 01-2 2h-2v4l-4-4H9a1.994 1.994 0 01-1.414-.586m0 0L11 14h4a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2v4l.586-.586z"></path>
                            </svg>
                            <p>жҡӮж— её–еӯҗеҶ…е®№</p>
                        </div>
                    `;
                    return;
                }

                // жёІжҹ“еҶ…е®№еҲ—иЎЁ
                container.innerHTML = data.posts.map(post => renderPostCard(post)).join('');

                // жёІжҹ“еҲҶйЎө
                if (data.totalPages > 1) {
                    renderPagination(data.totalPages);
                }

            } catch (error) {
                console.error('еҠ иҪҪеё–еӯҗеӨұиҙҘ:', error);
                container.innerHTML = `
                    <div class="empty-state">
                        <p>еҠ иҪҪеӨұиҙҘпјҢиҜ·зЁҚеҗҺйҮҚиҜ•</p>
                    </div>
                `;
            }
        }

        // жёІжҹ“еҶ…е®№еҚЎзүҮ
        function renderPostCard(post) {
            const firstImage = post.images && post.images.length > 0 ? post.images[0] : null;

            return `
                <div class="post-card" onclick="window.location.href='/post/${post.id}'">
                    ${post.is_pinned ? `
                        <div class="post-pinned">
                            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"></path>
                            </svg>
                            зҪ®йЎ¶
                        </div>
                    ` : ''}
                    <div class="post-header">
                        <h2 class="post-title">${escapeHtml(post.title)}</h2>
                        <div class="post-author">
                            <img src="${post.author_avatar || '/uploads/default-avatar.png'}" alt="${post.author_nickname}" class="post-author-avatar">
                            <span class="post-author-name">${escapeHtml(post.author_nickname)}</span>
                            ${post.author_title_name ? `<span class="user-title" style="background:${post.author_title_color || '#6366f1'};color:white;padding:2px 6px;border-radius:4px;font-size:11px;margin-left:6px;">${post.author_title_name}</span>` : ''}
                        </div>
                    </div>
                    <div class="post-content">
                        <div class="post-text">${escapeHtml(stripHtml(post.content).substring(0, 200))}</div>
                        ${firstImage ? `<img src="${firstImage}" alt="" class="post-image">` : ''}
                    </div>
                    <div class="post-footer">
                        <div class="post-stats">
                            <div class="post-stat">
                                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path>
                                </svg>
                                <span>${post.likes || 0}</span>
                            </div>
                            <div class="post-stat">
                                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
                                </svg>
                                <span>${post.comments_count || 0}</span>
                            </div>
                            <div class="post-stat">
                                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                                </svg>
                                <span>${post.views || 0}</span>
                            </div>
                        </div>
                        <div class="post-date">${formatDate(post.created_at)}</div>
                    </div>
                </div>
            `;
        }

        // жёІжҹ“еҲҶйЎө
        function renderPagination(totalPages) {
            const container = document.getElementById('contentContainer');
            let paginationHtml = '<div class="pagination">';

            // дёҠдёҖйЎ?
            paginationHtml += `
                <button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="changePage(${currentPage - 1})">
                    дёҠдёҖйЎ?
                </button>
            `;

            // йЎөз Ғ
            for (let i = 1; i <= totalPages; i++) {
                paginationHtml += `
                    <button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">
                        ${i}
                    </button>
                `;
            }

            // дёӢдёҖйЎ?
            paginationHtml += `
                <button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="changePage(${currentPage + 1})">
                    дёӢдёҖйЎ?
                </button>
            `;

            paginationHtml += '</div>';
            container.insertAdjacentHTML('beforeend', paginationHtml);
        }

        // еҲҮжҚўйЎөйқў
        function changePage(page) {
            currentPage = page;
            loadPosts();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // HTMLиҪ¬д№ү
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>内容详情 - 我的世界玄剑公会</title>
    <link rel="icon" href="/icon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/css/style.css?v=2.0.5">
    <style>
        .post-detail { max-width: 800px; margin: 0 auto; padding: 20px; }
        .post-detail-header { background: var(--card-bg, white); border-radius: 16px; padding: 30px; margin-bottom: 20px; box-shadow: var(--shadow, 0 2px 10px rgba(0,0,0,0.08)); }
        .post-detail-title { font-size: 28px; font-weight: 700; margin-bottom: 20px; line-height: 1.4; color: var(--text-color, #1e293b); }
        .post-detail-meta { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; justify-content: space-between; }
        .post-detail-author { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            cursor: pointer; 
            padding: 8px;
            border-radius: 8px;
            transition: background 0.3s;
        }
        .post-detail-author:hover { background: rgba(99,102,241,0.05); }
        .post-detail-avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; }
        .post-detail-author-info { display: flex; flex-direction: column; }
        .post-detail-author-name { font-weight: 600; color: var(--text-color, #1e293b); }
        .post-detail-author-username { font-size: 13px; color: var(--text-secondary, #64748b); }
        .post-detail-date { font-size: 13px; color: var(--text-secondary, #64748b); }
        .post-detail-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }
        .post-detail-tag { padding: 4px 12px; background: rgba(99,102,241,0.1); color: #6366f1; border-radius: 20px; font-size: 13px; }
        .post-detail-content { 
            background: var(--card-bg, white); 
            border-radius: 16px; 
            padding: 30px; 
            margin-bottom: 20px; 
            box-shadow: var(--shadow, 0 2px 10px rgba(0,0,0,0.08)); 
            line-height: 1.8; 
            font-size: 16px;
            white-space: pre-wrap;
            word-wrap: break-word;
            color: var(--text-color, #1e293b);
        }
        .post-detail-content p { margin-bottom: 16px; }
        .post-detail-content img { max-width: 100%; border-radius: 8px; margin: 16px 0; }
        .post-detail-content h1, .post-detail-content h2 { margin: 24px 0 16px; }
        .post-detail-content ul, .post-detail-content ol { margin: 16px 0; padding-left: 24px; }
        .post-detail-content blockquote { 
            border-left: 4px solid #6366f1; 
            padding-left: 16px; 
            margin: 16px 0; 
            color: var(--text-secondary, #64748b); 
        }
        .post-detail-content strong, .post-detail-content b { font-weight: 700; }
        .post-detail-content em, .post-detail-content i { font-style: italic; }
        .post-detail-content u { text-decoration: underline; }
        .post-detail-content s, .post-detail-content strike { text-decoration: line-through; }
        .post-detail-content br { display: block; margin: 8px 0; }
        .post-detail-actions { 
            display: flex; 
            gap: 16px; 
            margin-bottom: 20px; 
            align-items: center;
            justify-content: space-between;
        }
        .post-detail-actions-left { display: flex; gap: 12px; }
        .action-btn { display: flex; align-items: center; gap: 8px; padding: 12px 24px; border: 1px solid var(--border-color, #e2e8f0); background: var(--card-bg, white); border-radius: 10px; cursor: pointer; transition: all 0.3s; color: var(--text-color, #1e293b); }
        .action-btn:hover { border-color: #6366f1; color: #6366f1; }
        .action-btn.liked { background: #6366f1; color: white; border-color: #6366f1; }
        .edit-btn { 
            padding: 10px 20px; 
            background: var(--bg-color, #f1f5f9); 
            color: var(--text-secondary, #475569); 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 14px;
            transition: all 0.3s;
        }
        .edit-btn:hover { background: var(--border-color, #e2e8f0); }
        .comments-section { background: var(--card-bg, white); border-radius: 16px; padding: 30px; box-shadow: var(--shadow, 0 2px 10px rgba(0,0,0,0.08)); }
        .comments-title { font-size: 20px; font-weight: 600; margin-bottom: 20px; color: var(--text-color, #1e293b); }
        .comment-form { margin-bottom: 30px; }
        .comment-input { width: 100%; padding: 16px; border: 2px solid var(--border-color, #e2e8f0); border-radius: 12px; font-size: 15px; resize: vertical; min-height: 100px; background: var(--bg-color, white); color: var(--text-color, #1e293b); }
        .comment-input:focus { outline: none; border-color: #6366f1; }
        .comment-submit { margin-top: 12px; padding: 12px 24px; background: #6366f1; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .comment-item { padding: 20px 0; border-bottom: 1px solid var(--border-color, #e2e8f0); }
        .comment-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .comment-avatar { width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }
        .comment-author { font-weight: 600; cursor: pointer; color: var(--text-color, #1e293b); }
        .comment-author:hover { color: #6366f1; }
        .comment-time { font-size: 13px; color: var(--text-secondary, #64748b); margin-left: auto; }
        .comment-content { color: var(--text-color, #334155); line-height: 1.6; }
        .replies { margin-left: 52px; margin-top: 16px; padding-left: 20px; border-left: 2px solid var(--border-color, #e2e8f0); }
        .reply-form { margin-top: 12px; margin-left: 52px; }
        .reply-form textarea { width: 100%; padding: 12px; border: 2px solid var(--border-color, #e2e8f0); border-radius: 8px; font-size: 14px; resize: vertical; min-height: 80px; background: var(--bg-color, white); color: var(--text-color, #1e293b); }
        .reply-form textarea:focus { outline: none; border-color: #6366f1; }
        .reply-form-actions { display: flex; gap: 8px; margin-top: 8px; justify-content: flex-end; }
        .reply-btn { padding: 8px 16px; background: var(--bg-color, #f1f5f9); color: var(--text-secondary, #475569); border: none; border-radius: 6px; cursor: pointer; font-size: 13px; transition: all 0.3s; }
        .reply-btn:hover { background: var(--border-color, #e2e8f0); }
        .reply-submit-btn { padding: 8px 16px; background: #6366f1; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .reply-info { font-size: 13px; color: var(--text-secondary, #64748b); margin-bottom: 4px; }
        .reply-info span { color: #6366f1; font-weight: 500; }
        .comment-actions { display: flex; gap: 12px; margin-top: 8px; }
        .comment-action-btn { font-size: 13px; color: var(--text-secondary, #64748b); cursor: pointer; transition: color 0.3s; }
        .comment-action-btn:hover { color: #6366f1; }
        
        /* 汉堡菜单 */
        .hamburger {
            display: none;
            flex-direction: column;
            justify-content: space-around;
            width: 28px;
            height: 24px;
            cursor: pointer;
            z-index: 1001;
        }
        .hamburger span {
            display: block;
            width: 100%;
            height: 3px;
            background: var(--text-color, #1e293b);
            border-radius: 2px;
            transition: all 0.3s;
        }
        .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(6px, 6px); }
        .hamburger.active span:nth-child(2) { opacity: 0; }
        .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(6px, -6px); }
        
        .mobile-menu {
            display: none;
            position: fixed;
            top: 70px;
            left: 0;
            right: 0;
            background: var(--card-bg, white);
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            z-index: 1000;
            flex-direction: column;
            gap: 10px;
        }
        .mobile-menu.active { display: flex; }
        .mobile-menu a {
            padding: 12px 16px;
            color: var(--text-color, #1e293b);
            text-decoration: none;
            border-radius: 8px;
            transition: background 0.3s;
        }
        .mobile-menu a:hover { background: var(--bg-color, #f1f5f9); }
        
        /* 暗色模式适配 */
        [data-theme="dark"] .hamburger span {
            background: #f1f5f9;
        }
        
        [data-theme="dark"] .mobile-menu {
            background: #1e293b;
        }
        
        [data-theme="dark"] .mobile-menu a {
            color: #f1f5f9;
        }
        
        [data-theme="dark"] .mobile-menu a:hover {
            background: #334155;
        }
        
        @media (max-width: 768px) {
            .hamburger { display: flex; }
            .navbar-nav { display: none !important; }
            .post-detail { padding: 12px; }
            .post-detail-header { padding: 20px; }
            .post-detail-title { font-size: 22px; }
            .post-detail-content { padding: 20px; }
            .comments-section { padding: 20px; }
            .replies { margin-left: 20px; padding-left: 12px; }
            .reply-form { margin-left: 20px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-content">
            <a href="/" class="navbar-brand">
                <img src="/icon.png" alt="玄剑公会" class="navbar-logo">
                <div class="navbar-title">
                    <span class="navbar-title-cn">我的世界玄剑公会</span>
                    <span class="navbar-title-en">Minecraft Xuanjian Guild</span>
                </div>
            </a>
            <div class="navbar-nav">
                <a href="/daily" class="nav-link">日报</a>
                <a href="/decision" class="nav-link">决策</a>
                <a href="/forum" class="nav-link">贴吧</a>
                <a href="/stock" class="nav-link">股市</a>
                <a href="/shop" class="nav-link">商城</a>
                <a href="/rankings" class="nav-link">排行榜</a>
                <a href="/social" class="nav-link">社交媒体</a>
                <div class="nav-user">
                    <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">
                        <svg class="moon-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
                        </svg>
                        <svg class="sun-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
                        </svg>
                    </button>
                    <a href="/notifications" class="nav-notification" title="通知">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
                        </svg>
                        <span class="notification-badge" id="nav-notification-badge" style="display: none;">0</span>
                    </a>
                    <a href="/login" class="nav-login-btn">登录</a>
                </div>
            </div>
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>
    
    <div class="mobile-menu" id="mobile-menu">
        <a href="/">首页</a>
        <a href="/daily">日报</a>
        <a href="/decision">决策</a>
        <a href="/forum">贴吧</a>
        <a href="/stock">股市</a>
        <a href="/shop">商城</a>
        <a href="/rankings">排行榜</a>
        <a href="/social">社交媒体</a>
        <a href="/notifications">通知</a>
    </div>

    <main class="main-content">
        <div class="post-detail" id="post-detail">
            <div class="loading"><div class="spinner"></div></div>
        </div>
    </main>

    <script src="/js/common.js?v=2.0.5"></script>
    <script>
        // 汉堡菜单
        document.getElementById('hamburger').addEventListener('click', function() {
            this.classList.toggle('active');
            document.getElementById('mobile-menu').classList.toggle('active');
        });
        
        const postId = window.location.pathname.split('/').pop();
        let currentPost = null;
        let currentUser = null;

        async function loadPost() {
            try {
                // 获取当前用户信息
                try {
                    currentUser = await get('/api/auth/me');
                } catch (e) {
                    currentUser = null;
                }
                
                renderNavbar();
                
                const data = await get(`/api/posts/${postId}`);
                currentPost = data.post;
                renderPost(data.post, data.comments);
            } catch (error) {
                document.getElementById('post-detail').innerHTML = '<div class="empty-state"><h3>内容不存在</h3></div>';
            }
        }

        function renderPost(post, comments) {
            const container = document.getElementById('post-detail');
            const imagesHtml = post.images?.map(img => `<img src="${img}" alt="">`).join('') || '';
            
            const canEdit = currentUser && currentUser.id === post.author_id;
            const editButton = canEdit ? `<button class="edit-btn" onclick="editPost()">编辑</button>` : '';
            
            const titleHtml = post.author_title_name ? 
                `<span class="user-title" style="background:${post.author_title_color || '#6366f1'};color:white;padding:2px 6px;border-radius:4px;font-size:11px;margin-left:6px;">${post.author_title_name}</span>` : '';
            
            container.innerHTML = `
                <div class="post-detail-header">
                    <h1 class="post-detail-title">${post.title}</h1>
                    <div class="post-detail-meta">
                        <div class="post-detail-author" onclick="viewProfile('${post.author_username || post.author_id}')">
                            <img src="${post.author_avatar || '/uploads/default-avatar.png'}" class="post-detail-avatar">
                            <div class="post-detail-author-info">
                                <span class="post-detail-author-name">${post.author_nickname || '未知用户'}${titleHtml}</span>
                                <span class="post-detail-author-username">@${post.author_username || 'user' + post.author_id}</span>
                                <span class="post-detail-date">${formatDate(post.created_at)}</span>
                            </div>
                        </div>
                    </div>
                    ${post.tags ? `<div class="post-detail-tags">${post.tags.split(',').map(t => `<span class="post-detail-tag">${t.trim()}</span>`).join('')}</div>` : ''}
                </div>
                <div class="post-detail-content">${post.content}${imagesHtml}</div>
                <div class="post-detail-actions">
                    <div class="post-detail-actions-left">
                        <button class="action-btn ${post.isLiked ? 'liked' : ''}" onclick="toggleLike()">
                            <svg width="20" height="20" fill="${post.isLiked ? 'currentColor' : 'none'}" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                            <span>${formatNumber(post.likes)}</span>
                        </button>
                        <button class="action-btn"><svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg><span>${formatNumber(post.views)}</span></button>
                        <button class="action-btn" onclick="sharePost()">
                            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path></svg>
                            <span>分享</span>
                        </button>
                    </div>
                    ${editButton}
                </div>
                <div class="comments-section">
                    <h3 class="comments-title">评论 (${comments.length})</h3>
                    ${isLoggedIn() ? `
                        <div class="comment-form">
                            <textarea class="comment-input" id="comment-content" placeholder="发表你的评论..."></textarea>
                            <button class="comment-submit" onclick="submitComment()">发表评论</button>
                        </div>
                    ` : '<p style="color:var(--text-secondary,#64748b);margin-bottom:20px;">请<a href="/login" style="color:#6366f1;">登录</a>后发表评论</p>'}
                    <div class="comments-list">${comments.map(c => renderComment(c)).join('')}</div>
                </div>
            `;
        }

        function renderComment(comment, isReply = false) {
            const repliesHtml = comment.replies?.length ? `<div class="replies">${comment.replies.map(r => renderComment(r, true)).join('')}</div>` : '';
            const replyToInfo = isReply && comment.reply_to ? `<div class="reply-info">回复 <span>@${comment.reply_to.nickname}</span></div>` : '';
            const replyButton = isLoggedIn() ? `<span class="comment-action-btn" onclick="showReplyForm(${comment.id}, '${comment.author_nickname}')">回复</span>` : '';
            const replyFormHtml = isLoggedIn() ? `
                <div class="reply-form" id="reply-form-${comment.id}" style="display: none;">
                    <textarea id="reply-content-${comment.id}" placeholder="回复 ${comment.author_nickname}..."></textarea>
                    <div class="reply-form-actions">
                        <button class="reply-btn" onclick="hideReplyForm(${comment.id})">取消</button>
                        <button class="reply-submit-btn" onclick="submitReply(${comment.id})">发送</button>
                    </div>
                </div>
            ` : '';
            
            const titleHtml = comment.author_title_name ? 
                `<span class="user-title" style="background:${comment.author_title_color || '#6366f1'};color:white;padding:1px 5px;border-radius:3px;font-size:10px;margin-left:4px;">${comment.author_title_name}</span>` : '';
            
            return `
                <div class="comment-item" id="comment-${comment.id}">
                    <div class="comment-header">
                        <img src="${comment.author_avatar || '/uploads/default-avatar.png'}" class="comment-avatar" onclick="viewProfile('${comment.author_username || comment.author_id}')">
                        <span class="comment-author" onclick="viewProfile('${comment.author_username || comment.author_id}')">${comment.author_nickname}${titleHtml}</span>
                        <span class="comment-time">${formatDate(comment.created_at)}</span>
                    </div>
                    ${replyToInfo}
                    <div class="comment-content">${comment.content}</div>
                    <div class="comment-actions">
                        ${replyButton}
                    </div>
                    ${replyFormHtml}
                    ${repliesHtml}
                </div>
            `;
        }

        // 显示回复表单
        function showReplyForm(commentId, authorNickname) {
            // 隐藏所有其他回复表单
            document.querySelectorAll('.reply-form').forEach(form => form.style.display = 'none');
            const form = document.getElementById(`reply-form-${commentId}`);
            if (form) {
                form.style.display = 'block';
                const textarea = document.getElementById(`reply-content-${commentId}`);
                textarea.focus();
            }
        }

        // 隐藏回复表单
        function hideReplyForm(commentId) {
            const form = document.getElementById(`reply-form-${commentId}`);
            if (form) {
                form.style.display = 'none';
                document.getElementById(`reply-content-${commentId}`).value = '';
            }
        }

        // 提交回复
        async function submitReply(parentId) {
            // 检查邮箱验证状态
            if (!isEmailVerified()) {
                showEmailVerificationModal();
                return;
            }
            const content = document.getElementById(`reply-content-${parentId}`).value.trim();
            if (!content) {
                showToast('请输入回复内容', 'error');
                return;
            }
            try {
                await post(`/api/posts/${postId}/comments`, { content, parentId });
                hideReplyForm(parentId);
                loadPost();
                showToast('回复成功', 'success');
            } catch (e) {
                showToast('回复失败', 'error');
            }
        }

        // 查看用户档案
        function viewProfile(username) {
            window.location.href = `/profile/${username}`;
        }

        // 编辑帖子
        function editPost() {
            window.location.href = `/editor?edit=${postId}`;
        }

        async function toggleLike() {
            if (!isLoggedIn()) { window.location.href = '/login'; return; }
            // 检查邮箱验证状态
            if (!isEmailVerified()) {
                showEmailVerificationModal();
                return;
            }
            try {
                await post(`/api/posts/${postId}/like`);
                loadPost();
            } catch (e) { showToast('操作失败', 'error'); }
        }

        // 分享帖子
        function sharePost() {
            if (!currentPost) return;
            const shareText = `【${currentPost.title}】https://xuanjian.top/post/${postId}`;
            navigator.clipboard.writeText(shareText).then(() => {
                showToast('已复制到剪贴板', 'success');
            }).catch(() => {
                // 备用方案
                const textarea = document.createElement('textarea');
                textarea.value = shareText;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('已复制到剪贴板', 'success');
            });
        }

        // 显示点赞用户列表
        async function submitComment() {
            // 检查邮箱验证状态
            if (!isEmailVerified()) {
                showEmailVerificationModal();
                return;
            }
            const content = document.getElementById('comment-content').value.trim();
            if (!content) return;
            try {
                await post(`/api/posts/${postId}/comments`, { content });
                document.getElementById('comment-content').value = '';
                loadPost();
                showToast('评论成功', 'success');
            } catch (e) { showToast('评论失败', 'error'); }
        }

        document.addEventListener('DOMContentLoaded', loadPost);
    </script>
</body>
</html>

<!DOCTYPE html>

<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>еҸ‘еёғеҶ…е®№ - зҺ„еү‘е…¬дјҡ</title>
    <link rel="stylesheet" href="/css/style.css?v=2.0.3">
    <!-- еј•е…ҘеҜҢж–Үжң¬зј–иҫ‘еҷЁ -->
    <link rel="icon" href="/icon.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.0/dist/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.0/dist/quill.min.js"></script>
    <style>
        .editor-container {
            max-width: 900px;
            margin: 100px auto 40px;
            padding: 0 20px;
        }
        
        .editor-card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 32px;
            box-shadow: var(--shadow);
        }
        
        .editor-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 24px;
            text-align: center;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-primary);
        }
        
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border-color);
            border-radius: var(--radius);
            font-size: 15px;
            transition: var(--transition);
            font-family: inherit;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        
        /* еҜҢж–Үжң¬зј–иҫ‘еҷЁж ·ејҸ */
        .ql-container {
            border-radius: 0 0 var(--radius) var(--radius);
            min-height: 300px;
            font-size: 15px;
        }
        
        .ql-toolbar {
            border-radius: var(--radius) var(--radius) 0 0;
            background: var(--bg-color);
        }
        
        .ql-editor {
            min-height: 300px;
            font-family: inherit;
        }
        
        .ql-editor p {
            margin-bottom: 12px;
            line-height: 1.8;
        }
        
        .image-upload-area {
            border: 2px dashed var(--border-color);
            border-radius: var(--radius);
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .image-upload-area:hover {
            border-color: var(--primary-color);
            background: rgba(99, 102, 241, 0.05);
        }
        
        .image-preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 12px;
            margin-top: 16px;
        }
        
        .image-preview-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: var(--radius);
            overflow: hidden;
            border: 2px solid var(--border-color);
        }
        
        .image-preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .image-remove {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 24px;
            height: 24px;
            background: var(--danger-color);
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        
        .image-uploading {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
        }
        
        .editor-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 24px;
        }
        
        /* еҸ‘еёғжҢүй’®зӢ¬з«Ӣж ·ејҸ */
        .btn-publish {
            background: #6366f1;
            color: white;
            padding: 12px 32px;
            border: none;
            border-radius: var(--radius);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-publish:hover {
            background: #4f46e5;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }
        
        /* еҜҢж–Үжң¬зј–иҫ‘еҷЁе·Ҙе…·ж ҸжӮ¬еҒңжҸҗзӨ?*/
        .ql-toolbar button {
            position: relative;
        }
        
        .ql-toolbar button:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            padding: 4px 8px;
            background: #1e293b;
            color: white;
            font-size: 12px;
            border-radius: 4px;
            white-space: nowrap;
            z-index: 100;
            margin-bottom: 4px;
        }
        
        .ql-toolbar button:hover::before {
            content: '';
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 4px solid transparent;
            border-top-color: #1e293b;
            margin-bottom: -4px;
        }
    </style>
</head>
<body>
    <nav class="navbar" id="navbar"></nav>

    <main class="editor-container">
        <div class="editor-card">
            <h1 class="editor-title" id="page-title">еҸ‘еёғеҶ…е®№</h1>
            <form id="editor-form">
                <input type="hidden" id="post-id" value="">
                
                <div class="form-group">
                    <label class="form-label">ж Үйўҳ</label>
                    <input type="text" id="title" class="form-input" placeholder="иҜ·иҫ“е…Ҙж Үйў? required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">еҶ…е®№</label>
                    <div id="editor"></div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">ж ҮзӯҫпјҲз”ЁйҖ—еҸ·еҲҶйҡ”пј?/label>
                    <input type="text" id="tags" class="form-input" placeholder="дҫӢеҰӮпјҡе…¬е‘?жҙ»еҠЁ,ж”»з•Ҙ">
                </div>
                
                <div class="form-group">
                    <label class="form-label">еӣҫзүҮ</label>
                    <div class="image-upload-area" onclick="document.getElementById('image-input').click()">
                        <svg width="48" height="48" fill="none" stroke="var(--text-muted)" viewBox="0 0 24 24" style="margin: 0 auto 12px;">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                        </svg>
                        <div>зӮ№еҮ»дёҠдј еӣҫзүҮ</div>
                        <div style="font-size: 12px; color: var(--text-muted); margin-top: 8px;">ж”ҜжҢҒ JPGгҖҒPNGгҖҒGIFпјҢжңҖеӨ?10 еј?/div>
                    </div>
                    <input type="file" id="image-input" accept="image/*" multiple style="display: none;">
                    <div class="image-preview-grid" id="image-preview"></div>
                </div>
                
                <div class="editor-actions">
                    <a href="/" class="btn btn-secondary">еҸ–ж¶Ҳ</a>
                    <button type="submit" class="btn-publish" id="submit-btn">еҸ‘еёғ</button>
                </div>
            </form>
        </div>
    </main>

    <script src="/js/common.js?v=2.1.0"></script>
    <script>
        // еӯҳеӮЁе·ІдёҠдј зҡ„еӣҫзүҮ URL
        let uploadedImages = [];
        let quill = null;
        let isEditMode = false;
        let currentPostId = null;
        let postType = 'forum'; // й»ҳи®ӨеҸ‘еёғеҲ°иҙҙеҗ?        
        // еҲқе§ӢеҢ–еҜҢж–Үжң¬зј–иҫ‘еҷ?        function initEditor() {
            quill = new Quill('#editor', {
                theme: 'snow',
                placeholder: 'иҜ·иҫ“е…ҘеҶ…е®?..',
                modules: {
                    toolbar: [
                        ['bold', 'italic', 'underline', 'strike'],
                        ['blockquote', 'code-block'],
                        [{ 'header': 1 }, { 'header': 2 }],
                        [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                        [{ 'indent': '-1'}, { 'indent': '+1' }],
                        [{ 'size': ['small', false, 'large', 'huge'] }],
                        [{ 'color': [] }, { 'background': [] }],
                        [{ 'align': [] }],
                        ['link', 'image'],
                        ['clean']
                    ]
                }
            });
        }
        
        // жЈҖжҹҘжҳҜеҗҰдёәзј–иҫ‘жЁЎејҸ
        async function checkEditMode() {
            const urlParams = new URLSearchParams(window.location.search);
            const editId = urlParams.get('edit');
            const type = urlParams.get('type');
            
            if (type) {
                postType = type;
            }
            
            if (editId) {
                isEditMode = true;
                currentPostId = editId;
                document.getElementById('page-title').textContent = 'зј–иҫ‘еҶ…е®№';
                document.getElementById('submit-btn').textContent = 'дҝқеӯҳ';
                await loadPostForEdit(editId);
            }
        }
        
        // еҠ иҪҪеё–еӯҗж•°жҚ®з”ЁдәҺзј–иҫ‘
        async function loadPostForEdit(postId) {
            try {
                const data = await get(`/api/posts/${postId}`);
                const post = data.post;
                
                // жЈҖжҹҘжҳҜеҗҰдёәдҪңиҖ?                const currentUser = await get('/api/auth/me');
                if (currentUser.id !== post.author_id) {
                    showToast('еҸӘжңүдҪңиҖ…еҸҜд»Ҙзј–иҫ?, 'error');
                    window.location.href = '/';
                    return;
                }
                
                document.getElementById('post-id').value = postId;
                document.getElementById('title').value = post.title;
                document.getElementById('tags').value = post.tags || '';
                quill.root.innerHTML = post.content;
                postType = post.type;
                
                // еҠ иҪҪе·ІжңүеӣҫзүҮ
                if (post.images && post.images.length > 0) {
                    uploadedImages = post.images;
                    renderImagePreviews();
                }
            } catch (error) {
                showToast('еҠ иҪҪеӨұиҙҘ', 'error');
                window.location.href = '/';
            }
        }
        
        // жёІжҹ“еӣҫзүҮйў„и§Ҳ
        function renderImagePreviews() {
            const previewContainer = document.getElementById('image-preview');
            previewContainer.innerHTML = '';
            
            uploadedImages.forEach((url, index) => {
                const previewId = 'preview-' + index;
                const previewDiv = document.createElement('div');
                previewDiv.className = 'image-preview-item';
                previewDiv.id = previewId;
                previewDiv.innerHTML = `
                    <img src="${url}" alt="йў„и§Ҳ">
                    <button type="button" class="image-remove" onclick="removeImage(${index})">Г—</button>
                `;
                previewContainer.appendChild(previewDiv);
            });
        }
        
        // еӨ„зҗҶеӣҫзүҮдёҠдј 
        document.getElementById('image-input').addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;
            
            if (uploadedImages.length + files.length > 10) {
                showToast('жңҖеӨҡеҸӘиғҪдёҠдј?10 еј еӣҫзү?, 'error');
                return;
            }
            
            for (const file of files) {
                await uploadImage(file);
            }
            
            e.target.value = '';
        });
        
        // дёҠдј еҚ•еј еӣҫзүҮ
        async function uploadImage(file) {
            const previewId = 'preview-' + Date.now() + Math.random();
            const previewDiv = document.createElement('div');
            previewDiv.className = 'image-preview-item';
            previewDiv.id = previewId;
            previewDiv.innerHTML = `<div class="image-uploading">дёҠдј дё?..</div>`;
            document.getElementById('image-preview').appendChild(previewDiv);
            
            try {
                const formData = new FormData();
                formData.append('image', file);
                
                const response = await fetch('/api/upload/image', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${getToken()}`
                    },
                    body: formData
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'дёҠдј еӨұиҙҘ');
                }
                
                uploadedImages.push(data.url);
                renderImagePreviews();
                
            } catch (error) {
                previewDiv.remove();
                showToast(error.message, 'error');
            }
        }
        
        // з§»йҷӨеӣҫзүҮ
        function removeImage(index) {
            uploadedImages.splice(index, 1);
            renderImagePreviews();
        }
        
        // жҸҗдәӨиЎЁеҚ•
        document.getElementById('editor-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const content = quill.root.innerHTML;
            if (content === '<p><br></p>' || !content.trim()) {
                showToast('иҜ·иҫ“е…ҘеҶ…е®?, 'error');
                return;
            }
            
            try {
                const data = {
                    title: document.getElementById('title').value,
                    content: content,
                    type: postType,
                    tags: document.getElementById('tags').value,
                    images: uploadedImages
                };
                
                if (isEditMode) {
                    await put(`/api/posts/${currentPostId}`, data);
                    showToast('дҝқеӯҳжҲҗеҠҹ', 'success');
                    setTimeout(() => {
                        window.location.href = `/post/${currentPostId}`;
                    }, 1000);
                } else {
                    const result = await post('/api/posts', data);
                    showToast('еҸ‘еёғжҲҗеҠҹ', 'success');
                    setTimeout(() => {
                        window.location.href = `/${postType}`;
                    }, 1000);
                }
                
            } catch (error) {
                showToast(error.message, 'error');
            }
        });
        
        // жЈҖжҹҘзҷ»еҪ•зҠ¶жҖ?        document.addEventListener('DOMContentLoaded', () => {
            const token = getToken();
            if (!token) {
                showToast('иҜ·е…Ҳзҷ»еҪ•', 'error');
                setTimeout(() => {
                    window.location.href = '/login';
                }, 1000);
                return;
            }
            
            initEditor();
            checkEditMode();
        });
    </script>
</body>
</html>

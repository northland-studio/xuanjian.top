<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" href="/icon.ico" type="image/x-icon">
    <title>重置密码 - 玄剑公会</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .reset-container { max-width: 400px; margin: 80px auto; padding: 20px; }
        .reset-card { background: var(--card-bg); border-radius: 16px; padding: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border: 1px solid var(--border-color); }
        .reset-header { text-align: center; margin-bottom: 30px; }
        .reset-header h1 { font-size: 24px; margin-bottom: 8px; color: var(--text-primary); }
        .reset-header p { color: var(--text-secondary); font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: var(--text-primary); }
        .form-group input { width: 100%; padding: 12px 16px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 14px; background: var(--bg-color); color: var(--text-primary); }
        .form-group input:focus { outline: none; border-color: var(--primary); }
        .submit-btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 500; cursor: pointer; transition: all 0.3s; }
        .submit-btn:hover { background: #4f46e5; }
        .submit-btn:disabled { background: #9ca3af; cursor: not-allowed; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: var(--text-secondary); text-decoration: none; }
        .back-link:hover { color: var(--primary); }
        .error-message { text-align: center; padding: 40px 20px; }
        .error-message h2 { color: #ef4444; margin-bottom: 16px; }
        .error-message p { color: var(--text-secondary); }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-content">
            <a href="/" class="navbar-brand">
                <img src="/icon.png" alt="玄剑公会" class="navbar-logo">
                <div class="navbar-title">
                    <span class="navbar-title-cn">我的世界玄剑公会</span>
                    <span class="navbar-title-en">Minecraft Xuanjian Guild</span>
                </div>
            </a>
            <div class="navbar-nav">
                <a href="/daily" class="nav-link">日报</a>
                <a href="/decision" class="nav-link">决策</a>
                <a href="/forum" class="nav-link">贴吧</a>
                <a href="/stock" class="nav-link">股市</a>
                <a href="/shop" class="nav-link">商城</a>
                <a href="/rankings" class="nav-link">排行榜</a>
                <a href="/social" class="nav-link">社交媒体</a>
                <div class="nav-user">
                    <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">
                        <svg class="moon-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
                        </svg>
                        <svg class="sun-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
                        </svg>
                    </button>
                    <a href="/login" class="nav-login-btn">登录</a>
                </div>
            </div>
            <button class="mobile-menu-btn">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <main class="main-content">
        <div class="reset-container">
            <div class="reset-card">
                <div id="loadingState" style="text-align: center; padding: 40px;">
                    <div class="loading-spinner"></div>
                    <p style="margin-top: 16px; color: var(--text-secondary);">验证中...</p>
                </div>
                
                <div id="errorState" class="error-message" style="display: none;">
                    <h2>链接无效</h2>
                    <p>重置链接已过期或无效，请重新申请密码重置。</p>
                    <a href="/forgot-password" class="back-link">重新申请</a>
                </div>
                
                <div id="resetForm" style="display: none;">
                    <div class="reset-header">
                        <h1>设置新密码</h1>
                        <p>请输入您的新密码</p>
                    </div>
                    
                    <form id="passwordForm">
                        <div class="form-group">
                            <label for="newPassword">新密码</label>
                            <input type="password" id="newPassword" name="newPassword" placeholder="至少6位字符" required minlength="6">
                        </div>
                        <div class="form-group">
                            <label for="confirmPassword">确认密码</label>
                            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="再次输入新密码" required>
                        </div>
                        <button type="submit" class="submit-btn" id="submitBtn">重置密码</button>
                    </form>
                </div>
                
                <div id="successState" class="error-message" style="display: none;">
                    <h2 style="color: #10b981;">重置成功</h2>
                    <p>密码已重置，请使用新密码登录。</p>
                    <a href="/login" class="back-link">前往登录</a>
                </div>
            </div>
        </div>
    </main>

    <script src="/js/common.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        async function verifyToken() {
            if (!token) {
                showError();
                return;
            }
            
            try {
                const res = await fetch(`/api/password/verify-reset-token/${token}`);
                const data = await res.json();
                
                if (data.valid) {
                    document.getElementById('loadingState').style.display = 'none';
                    document.getElementById('resetForm').style.display = 'block';
                } else {
                    showError();
                }
            } catch (err) {
                showError();
            }
        }
        
        function showError() {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('errorState').style.display = 'block';
        }
        
        document.getElementById('passwordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (newPassword !== confirmPassword) {
                showToast('两次输入的密码不一致', 'error');
                return;
            }
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = '重置中...';
            
            try {
                const res = await fetch('/api/password/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    document.getElementById('resetForm').style.display = 'none';
                    document.getElementById('successState').style.display = 'block';
                } else {
                    showToast(data.error || '重置失败', 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = '重置密码';
                }
            } catch (err) {
                showToast('网络错误', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = '重置密码';
            }
        });
        
        verifyToken();
    </script>
</body>
</html>

<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" href="/icon.ico" type="image/x-icon">
    <style>
        .shop-container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .shop-header { text-align: center; margin-bottom: 40px; }
        .shop-header h1 { font-size: 32px; color: var(--text-primary); margin-bottom: 10px; }
        .shop-header p { color: var(--text-secondary); }
        .shop-tabs { display: flex; gap: 12px; margin-bottom: 30px; justify-content: center; flex-wrap: wrap; }
        .shop-tab { padding: 10px 24px; border-radius: 20px; background: var(--card-bg); border: 1px solid var(--border-color); cursor: pointer; transition: all 0.3s; color: var(--text-primary); }
        .shop-tab.active { background: var(--primary); color: white; border-color: var(--primary); }
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .shop-item { background: var(--card-bg); border-radius: 16px; overflow: hidden; border: 1px solid var(--border-color); transition: all 0.3s; }
        .shop-item:hover { transform: translateY(-4px); box-shadow: 0 8px 30px rgba(0,0,0,0.12); }
        .shop-item-image { height: 160px; background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); display: flex; align-items: center; justify-content: center; }
        .shop-item-image img { max-width: 80%; max-height: 80%; }
        .shop-item-content { padding: 20px; }
        .shop-item-name { font-size: 18px; font-weight: 600; margin-bottom: 8px; color: var(--text-primary); }
        .shop-item-desc { font-size: 14px; color: var(--text-secondary); margin-bottom: 16px; line-height: 1.5; }
        .shop-item-footer { display: flex; justify-content: space-between; align-items: center; }
        .shop-item-price { font-size: 20px; font-weight: 700; color: #f59e0b; }
        .shop-item-price span { font-size: 14px; font-weight: 400; }
        .shop-buy-btn { padding: 8px 20px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; transition: all 0.3s; }
        .shop-buy-btn:hover { background: #4f46e5; }
        .shop-buy-btn:disabled { background: #9ca3af; cursor: not-allowed; }
        .user-balance { background: linear-gradient(135deg, #f59e0b 0%, #f97316 100%); color: white; padding: 16px 24px; border-radius: 12px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .user-balance-label { font-size: 14px; opacity: 0.9; }
        .user-balance-value { font-size: 28px; font-weight: 700; }
        .title-badge { padding: 8px 16px; border-radius: 8px; font-size: 16px; font-weight: 600; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-content">
            <a href="/" class="navbar-brand">
                <img src="/icon.png" alt="зҺ„еү‘е…¬дјҡ" class="navbar-logo">
                <div class="navbar-title">
                    <span class="navbar-title-cn">жҲ‘зҡ„дё–з•ҢзҺ„еү‘е…¬дјҡ</span>
                    <span class="navbar-title-en">Minecraft Xuanjian Guild</span>
                </div>
            </a>
            <div class="navbar-nav">
                <a href="/daily" class="nav-link">ж—ҘжҠҘ</a>
                <a href="/decision" class="nav-link">еҶізӯ–</a>
                <a href="/forum" class="nav-link">иҙҙеҗ§</a>
                <a href="/stock" class="nav-link">иӮЎеёӮ</a>
                <a href="/shop" class="nav-link active">е•ҶеҹҺ</a>
                <a href="/rankings" class="nav-link">жҺ’иЎҢжҰ?/a>
                <a href="/social" class="nav-link">зӨҫдәӨеӘ’дҪ“</a>
                <div class="nav-user">
                    <button class="theme-toggle" onclick="toggleTheme()" title="еҲҮжҚўдё»йўҳ">
                        <svg class="moon-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
                        </svg>
                        <svg class="sun-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
                        </svg>
                    </button>
                    <a href="/notifications" class="nav-notification" title="йҖҡзҹҘ">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
                        </svg>
                        <span class="notification-badge" id="nav-notification-badge" style="display: none;">0</span>
                    </a>
                    <a href="/login" class="nav-login-btn">зҷ»еҪ•</a>
                </div>
            </div>
            <button class="mobile-menu-btn">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <main class="main-content">
        <div class="shop-container">
            <div class="shop-header">
                <h1>е•ҶеҹҺ</h1>
                <p>дҪҝз”ЁиҙЎзҢ®зӮ№иҙӯд№°еҗ„з§ҚйҒ“е…·е’Ңз§°еҸ·</p>
            </div>

            <div class="user-balance" id="userBalance" style="display: none;">
                <div>
                    <div class="user-balance-label">жҲ‘зҡ„иҙЎзҢ®зӮ?/div>
                    <div class="user-balance-value" id="balanceValue">0.00</div>
                </div>
                <div style="display:flex;gap:16px;">
                    <a href="/claims" style="color: white; text-decoration: underline;">з”іжҠҘиҙЎзҢ®зӮ?/a>
                    <a href="/inventory" style="color: white; text-decoration: underline;">жҲ‘зҡ„д»“еә“</a>
                </div>
            </div>

            <div class="shop-tabs">
                <div class="shop-tab active" data-type="titles">з§°еҸ·</div>
                <div class="shop-tab" data-type="items">е•Ҷе“Ғ</div>
            </div>

            <div class="shop-grid" id="shopGrid">
                <div class="loading-spinner"></div>
            </div>
        </div>
    </main>

    <script src="/js/common.js"></script>
    <script>
        const token = localStorage.getItem('token');
        let currentType = 'titles';

        async function loadUserBalance() {
            if (!token) return;
            try {
                const user = await get('/api/auth/me');
                document.getElementById('userBalance').style.display = 'flex';
                document.getElementById('balanceValue').textContent = (user.contribution || 0).toFixed(2);
            } catch (e) {}
        }

        async function loadShopItems() {
            try {
                const grid = document.getElementById('shopGrid');
                
                if (currentType === 'titles') {
                    const data = await get('/api/titles');
                    const titles = (data.titles || []).filter(t => t.in_shop == 1);
                    
                    if (titles.length === 0) {
                        grid.innerHTML = '<div class="empty-state"><p>жҡӮж— з§°еҸ·еҮәе”®</p></div>';
                        return;
                    }
                    
                    grid.innerHTML = titles.map(title => `
                        <div class="shop-item">
                            <div class="shop-item-image" style="background: linear-gradient(135deg, ${title.color} 0%, ${adjustColor(title.color, 30)} 100%);">
                                <span class="title-badge" style="background: rgba(255,255,255,0.2); color: white; padding: 12px 24px; border-radius: 12px; font-size: 20px;">${title.name}</span>
                            </div>
                            <div class="shop-item-content">
                                <div class="shop-item-name">${title.name}</div>
                                <div class="shop-item-desc">${title.description || 'зӢ¬зү№зҡ„иә«д»Ҫж ҮиҜ?}</div>
                                <div class="shop-item-footer">
                                    <div class="shop-item-price">${title.price} <span>иҙЎзҢ®зӮ?/span></div>
                                    <button class="shop-buy-btn" onclick="buyTitle(${title.id}, '${title.name}', ${title.price})">иҙӯд№°</button>
                                </div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    const data = await get('/api/shop/items?type=other');
                    const items = data.items || [];
                    
                    if (items.length === 0) {
                        grid.innerHTML = '<div class="empty-state"><p>жҡӮж— е•Ҷе“Ғ</p></div>';
                        return;
                    }
                    
                    grid.innerHTML = items.map(item => `
                        <div class="shop-item">
                            <div class="shop-item-image">
                                ${item.image ? `<img src="${item.image}" alt="${item.name}">` : `<span style="font-size: 48px; color: white;">рҹ“Ұ</span>`}
                            </div>
                            <div class="shop-item-content">
                                <div class="shop-item-name">${item.name}</div>
                                <div class="shop-item-desc">${item.description || 'жҡӮж— жҸҸиҝ°'}</div>
                                <div class="shop-item-footer">
                                    <div class="shop-item-price">${item.price} <span>иҙЎзҢ®зӮ?/span></div>
                                    <button class="shop-buy-btn" onclick="buyItem(${item.id}, '${item.name}', ${item.price})">иҙӯд№°</button>
                                </div>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (e) {
                showToast('еҠ иҪҪеӨұиҙҘ', 'error');
            }
        }

        function adjustColor(color, amount) {
            const hex = color.replace('#', '');
            const num = parseInt(hex, 16);
            const r = Math.min(255, Math.max(0, (num >> 16) + amount));
            const g = Math.min(255, Math.max(0, ((num >> 8) & 0x00FF) + amount));
            const b = Math.min(255, Math.max(0, (num & 0x0000FF) + amount));
            return `#${(1 << 24 | r << 16 | g << 8 | b).toString(16).slice(1)}`;
        }

        async function buyTitle(id, name, price) {
            if (!token) {
                showToast('иҜ·е…Ҳзҷ»еҪ•', 'error');
                setTimeout(() => window.location.href = '/login', 1000);
                return;
            }
            
            if (!confirm(`зЎ®е®ҡиҙӯд№°з§°еҸ·гҖ?{name}гҖҚпјҹ\nд»·ж јпј?{price} иҙЎзҢ®зӮ№`)) return;
            
            try {
                const res = await fetch(`/api/titles/${id}/buy`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                const data = await res.json();
                
                if (res.ok) {
                    showToast('иҙӯд№°жҲҗеҠҹпјҒиҜ·ең?жҲ‘зҡ„д»“еә“"дёӯжҹҘзң?);
                    loadUserBalance();
                } else {
                    showToast(data.error || 'иҙӯд№°еӨұиҙҘ', 'error');
                }
            } catch (e) {
                showToast('зҪ‘з»ңй”ҷиҜҜ', 'error');
            }
        }

        async function buyItem(id, name, price) {
            if (!token) {
                showToast('иҜ·е…Ҳзҷ»еҪ•', 'error');
                setTimeout(() => window.location.href = '/login', 1000);
                return;
            }
            
            if (!confirm(`зЎ®е®ҡиҙӯд№°гҖ?{name}гҖҚпјҹ\nд»·ж јпј?{price} иҙЎзҢ®зӮ№`)) return;
            
            try {
                const res = await fetch(`/api/shop/items/${id}/buy`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                const data = await res.json();
                
                if (res.ok) {
                    showToast('иҙӯд№°жҲҗеҠҹпјҒиҜ·ең?жҲ‘зҡ„д»“еә“"дёӯжҹҘзң?);
                    loadUserBalance();
                } else {
                    showToast(data.error || 'иҙӯд№°еӨұиҙҘ', 'error');
                }
            } catch (e) {
                showToast('зҪ‘з»ңй”ҷиҜҜ', 'error');
            }
        }

        document.querySelectorAll('.shop-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.shop-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentType = tab.dataset.type;
                loadShopItems();
            });
        });

        loadUserBalance();
        loadShopItems();
    </script>
</body>
</html>

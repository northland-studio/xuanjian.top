<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>жіЁеҶҢ - жҲ‘зҡ„дё–з•ҢзҺ„еү‘е…¬дјҡ</title>
    <link rel="icon" href="/icon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/css/style.css?v=2.0.3">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background:linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('2.png') center/cover no-repeat;
        }
        .auth-box {
            background: rgba(255, 255, 255, 0.285);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .auth-logo img {
            width: 80px;
            height: 80px;
            border-radius: 16px;
        }
        .auth-title {
            font-size: 24px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 8px;
        }
        .auth-subtitle {
            text-align: center;
            color: #94979a;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
        }
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s;
        }
        .form-input:focus {
            outline: none;
            border-color: #6366f1;
        }
        .auth-btn {
            width: 100%;
            padding: 14px;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        .auth-btn:hover {
            background: #4f46e5;
        }
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #e2e8f0;
        }
        .auth-footer a {
            color: #6366f1;
            text-decoration: none;
            font-weight: 500;
        }
        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        .success-message {
            background: #d1fae5;
            color: #059669;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-box">
            <div class="auth-logo">
                <img src="/icon.png" alt="зҺ„еү‘е…¬дјҡ">
            </div>
            <h1 class="auth-title">еҲӣе»әиҙҰеҸ·</h1>
            <p class="auth-subtitle">еҠ е…ҘзҺ„еү‘е…¬дјҡпјҢејҖеҗҜзІҫеҪ©ж—…зЁ?/p>
            
            <div class="error-message" id="error-msg"></div>
            <div class="success-message" id="success-msg"></div>
            
            <form id="register-form">
                <div class="form-group">
                    <label class="form-label">з”ЁжҲ·еҗ?/label>
                    <input type="text" class="form-input" id="username" placeholder="иҜ·иҫ“е…Ҙз”ЁжҲ·еҗҚ" required>
                </div>
                <div class="form-group">
                    <label class="form-label">жҳөз§°</label>
                    <input type="text" class="form-input" id="nickname" placeholder="иҜ·иҫ“е…Ҙжҳөз§? required>
                </div>
                <div class="form-group">
                    <label class="form-label">йӮ®з®ұ</label>
                    <div style="display: flex; gap: 8px;">
                        <input type="email" class="form-input" id="email" placeholder="иҜ·иҫ“е…ҘйӮ®з®? required style="flex: 1;">
                        <button type="button" class="auth-btn" id="send-code-btn" onclick="sendVerificationCode()" style="width: auto; padding: 12px 16px; white-space: nowrap;">иҺ·еҸ–йӘҢиҜҒз ?/button>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">йӘҢиҜҒз ?/label>
                    <input type="text" class="form-input" id="verification-code" placeholder="иҜ·иҫ“е…ҘйӮ®з®ұйӘҢиҜҒз Ғ" required maxlength="6">
                </div>
                <div class="form-group">
                    <label class="form-label">еҜҶз Ғ</label>
                    <input type="password" class="form-input" id="password" placeholder="иҜ·иҫ“е…ҘеҜҶз ҒпјҲиҮіе°‘6дҪҚпјү" required minlength="6">
                </div>
                <div class="form-group">
                    <label class="form-label">зЎ®и®ӨеҜҶз Ғ</label>
                    <input type="password" class="form-input" id="confirm-password" placeholder="иҜ·еҶҚж¬Ўиҫ“е…ҘеҜҶз ? required>
                </div>
                <button type="submit" class="auth-btn">жіЁеҶҢ</button>
            </form>
            
            <div class="auth-footer">
                е·ІжңүиҙҰеҸ·пј?a href="/login">з«ӢеҚізҷ»еҪ•</a>
            </div>
        </div>
    </div>

    <script src="/js/common.js?v=2.1.0"></script>
    <script>
        let countdown = 0;

        // еҸ‘йҖҒйӘҢиҜҒз Ғ
        async function sendVerificationCode() {
            const email = document.getElementById('email').value;
            const errorMsg = document.getElementById('error-msg');
            const sendBtn = document.getElementById('send-code-btn');

            if (!email) {
                errorMsg.textContent = 'иҜ·е…Ҳиҫ“е…ҘйӮ®з®ұең°еқҖ';
                errorMsg.style.display = 'block';
                return;
            }

            // йӘҢиҜҒйӮ®з®ұж јејҸ
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                errorMsg.textContent = 'йӮ®з®ұж јејҸдёҚжӯЈзЎ?;
                errorMsg.style.display = 'block';
                return;
            }

            try {
                sendBtn.disabled = true;
                await post('/api/auth/send-code', { email, type: 'register' });

                // ејҖе§ӢеҖ’и®Ўж—?
                countdown = 60;
                sendBtn.textContent = `${countdown}з§’еҗҺйҮҚиҜ•`;
                const timer = setInterval(() => {
                    countdown--;
                    if (countdown <= 0) {
                        clearInterval(timer);
                        sendBtn.disabled = false;
                        sendBtn.textContent = 'иҺ·еҸ–йӘҢиҜҒз ?;
                    } else {
                        sendBtn.textContent = `${countdown}з§’еҗҺйҮҚиҜ•`;
                    }
                }, 1000);

                errorMsg.textContent = '';
                errorMsg.style.display = 'none';
                showToast('йӘҢиҜҒз Ғе·ІеҸ‘йҖҒпјҢиҜ·жҹҘж”¶йӮ®д»?, 'success');
            } catch (error) {
                sendBtn.disabled = false;
                errorMsg.textContent = error.message;
                errorMsg.style.display = 'block';
            }
        }

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const nickname = document.getElementById('nickname').value;
            const email = document.getElementById('email').value;
            const verificationCode = document.getElementById('verification-code').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const errorMsg = document.getElementById('error-msg');
            const successMsg = document.getElementById('success-msg');

            // йӘҢиҜҒеҜҶз Ғ
            if (password !== confirmPassword) {
                errorMsg.textContent = 'дёӨж¬Ўиҫ“е…Ҙзҡ„еҜҶз ҒдёҚдёҖиҮ?;
                errorMsg.style.display = 'block';
                successMsg.style.display = 'none';
                return;
            }

            try {
                await post('/api/auth/register', {
                    username,
                    nickname,
                    email,
                    password,
                    verificationCode
                });

                successMsg.textContent = 'жіЁеҶҢжҲҗеҠҹпјҒеҚіе°Ҷи·іиҪ¬еҲ°зҷ»еҪ•йЎөйқў...';
                successMsg.style.display = 'block';
                errorMsg.style.display = 'none';

                setTimeout(() => {
                    window.location.href = '/login';
                }, 1500);
            } catch (error) {
                errorMsg.textContent = error.message;
                errorMsg.style.display = 'block';
                successMsg.style.display = 'none';
            }
        });
    </script>
</body>
</html>

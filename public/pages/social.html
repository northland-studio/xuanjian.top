<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社交媒体 - 我的世界玄剑公会</title>
    <link rel="icon" href="/icon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .social-grid {
            max-width: 900px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            padding: 20px;
        }
        .social-card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            transition: all 0.3s;
            text-decoration: none;
            color: inherit;
        }
        .social-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.12);
        }
        .social-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .social-icon.douyin {
            background: linear-gradient(135deg, #ff0050, #ff6b6b);
        }
        .social-icon.bilibili {
            background: linear-gradient(135deg, #00a1d6, #00b5e5);
        }
        .social-icon.qq {
            background: linear-gradient(135deg, #12b7f5, #00a1d6);
        }
        .social-icon.email {
            background: linear-gradient(135deg, #ea4335, #fbbc05);
        }
        .social-icon svg {
            width: 40px;
            height: 40px;
            color: white;
        }
        .social-name {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .social-desc {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 16px;
        }
        .social-btn {
            display: inline-block;
            padding: 10px 24px;
            background: #6366f1;
            color: white;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
        }
        .contact-info {
            max-width: 600px;
            margin: 40px auto;
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .contact-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            text-align: center;
        }
        .contact-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            border-bottom: 1px solid #e2e8f0;
        }
        .contact-item:last-child {
            border-bottom: none;
        }
        .contact-icon {
            width: 48px;
            height: 48px;
            background: #f1f5f9;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .contact-icon svg {
            width: 24px;
            height: 24px;
            color: #6366f1;
        }
        .contact-content {
            flex: 1;
        }
        .contact-label {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 4px;
        }
        .contact-value {
            font-size: 15px;
            font-weight: 500;
        }
    </style>
</head>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忘记密码 - 玄剑公会</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .forgot-container { max-width: 400px; margin: 80px auto; padding: 20px; }
        .forgot-card { background: var(--card-bg); border-radius: 16px; padding: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border: 1px solid var(--border-color); }
        .forgot-header { text-align: center; margin-bottom: 30px; }
        .forgot-header h1 { font-size: 24px; margin-bottom: 8px; color: var(--text-primary); }
        .forgot-header p { color: var(--text-secondary); font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: var(--text-primary); }
        .form-group input { width: 100%; padding: 12px 16px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 14px; background: var(--bg-color); color: var(--text-primary); }
        .form-group input:focus { outline: none; border-color: var(--primary); }
        .submit-btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 500; cursor: pointer; transition: all 0.3s; }
        .submit-btn:hover { background: #4f46e5; }
        .submit-btn:disabled { background: #9ca3af; cursor: not-allowed; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: var(--text-secondary); text-decoration: none; }
        .back-link:hover { color: var(--primary); }
        .success-message { text-align: center; padding: 20px; }
        .success-message h2 { color: #10b981; margin-bottom: 16px; }
        .success-message p { color: var(--text-secondary); line-height: 1.6; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-content">
            <a href="/" class="navbar-brand">
                <img src="/icon.png" alt="玄剑公会" class="navbar-logo">
                <div class="navbar-title">
                    <span class="navbar-title-cn">我的世界玄剑公会</span>
                    <span class="navbar-title-en">Minecraft Xuanjian Guild</span>
                </div>
            </a>
            <div class="navbar-nav">
                <a href="/daily" class="nav-link">日报</a>
                <a href="/decision" class="nav-link">决策</a>
                <a href="/forum" class="nav-link">贴吧</a>
                <a href="/stock" class="nav-link">股市</a>
                <a href="/shop" class="nav-link">商城</a>
                <a href="/rankings" class="nav-link">排行榜</a>
                <a href="/social" class="nav-link">社交媒体</a>
                <div class="nav-user">
                    <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">
                        <svg class="moon-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
                        </svg>
                        <svg class="sun-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
                        </svg>
                    </button>
                    <a href="/login" class="nav-login-btn">登录</a>
                </div>
            </div>
            <button class="mobile-menu-btn">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <main class="main-content">
        <div class="forgot-container">
            <div class="forgot-card">
                <div class="forgot-header">
                    <h1>忘记密码</h1>
                    <p>输入您的邮箱地址，我们将发送重置链接</p>
                </div>
                
                <form id="forgotForm">
                    <div class="form-group">
                        <label for="email">邮箱地址</label>
                        <input type="email" id="email" name="email" placeholder="请输入绑定的邮箱" required>
                    </div>
                    <button type="submit" class="submit-btn" id="submitBtn">发送重置邮件</button>
                </form>
                
                <div id="successMessage" class="success-message" style="display: none;">
                    <h2>邮件已发送</h2>
                    <p>重置链接已发送到您的邮箱，请在1小时内完成密码重置。如果未收到邮件，请检查垃圾邮件文件夹。</p>
                </div>
                
                <a href="/login" class="back-link">返回登录</a>
            </div>
        </div>
    </main>

    <script src="/js/common.js"></script>
    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const submitBtn = document.getElementById('submitBtn');
            
            submitBtn.disabled = true;
            submitBtn.textContent = '发送中...';
            
            try {
                const res = await fetch('/api/password/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    document.getElementById('forgotForm').style.display = 'none';
                    document.getElementById('successMessage').style.display = 'block';
                } else {
                    showToast(data.error || '发送失败', 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = '发送重置邮件';
                }
            } catch (err) {
                showToast('网络错误', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = '发送重置邮件';
            }
        });
    </script>
</body>
</html>

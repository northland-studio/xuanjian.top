        .forgot-header { text-align: center; margin-bottom: 30px; }

        .form-group input:focus { outline: none; border-color: var(--primary); }
        .submit-btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 500; cursor: pointer; transition: all 0.3s; }
        .submit-btn:hover { background: #4f46e5; }
        .submit-btn:disabled { background: #9ca3af; cursor: not-allowed; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: var(--text-secondary); text-decoration: none; }
        .back-link:hover { color: var(--primary); }
        .success-message { text-align: center; padding: 20px; }

    <nav class="navbar">

                    <span class="navbar-title-en">Minecraft Xuanjian Guild</span>
                </div>
            </a>
            <div class="navbar-nav">
                <a href="/daily" class="nav-link">ж—ҘжҠҘ</a>
                <a href="/decision" class="nav-link">еҶізӯ–</a>
                <a href="/forum" class="nav-link">иҙҙеҗ§</a>
                <a href="/stock" class="nav-link">иӮЎеёӮ</a>
                <a href="/shop" class="nav-link">е•ҶеҹҺ</a>
                <a href="/rankings" class="nav-link">жҺ’иЎҢжҰ?/a>
                <a href="/social" class="nav-link">зӨҫдәӨеӘ’дҪ“</a>
                <div class="nav-user">
                    <button class="theme-toggle" onclick="toggleTheme()" title="еҲҮжҚўдё»йўҳ">
                        <svg class="moon-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>

                        <svg class="sun-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">

    <main class="main-content">
        <div class="forgot-container">
            <div class="forgot-card">
                <div class="forgot-header">
                    <h1>еҝҳи®°еҜҶз Ғ</h1>
                    <p>иҫ“е…ҘжӮЁзҡ„йӮ®з®ұең°еқҖпјҢжҲ‘д»¬е°ҶеҸ‘йҖҒйҮҚзҪ®й“ҫжҺ?/p>
                </div>
                
                <form id="forgotForm">
                    <div class="form-group">
                        <label for="email">йӮ®з®ұең°еқҖ</label>
                        <input type="email" id="email" name="email" placeholder="иҜ·иҫ“е…Ҙз»‘е®ҡзҡ„йӮ®з®ұ" required>
                    </div>
                    <button type="submit" class="submit-btn" id="submitBtn">еҸ‘йҖҒйҮҚзҪ®йӮ®д»?/button>
                </form>
                
                <div id="successMessage" class="success-message" style="display: none;">
                    <h2>йӮ®д»¶е·ІеҸ‘йҖ?/h2>
                    <p>йҮҚзҪ®й“ҫжҺҘе·ІеҸ‘йҖҒеҲ°жӮЁзҡ„йӮ®з®ұпјҢиҜ·ең?е°Ҹж—¶еҶ…е®ҢжҲҗеҜҶз ҒйҮҚзҪ®гҖӮеҰӮжһңжңӘж”¶еҲ°йӮ®д»¶пјҢиҜ·жЈҖжҹҘеһғеңҫйӮ®д»¶ж–Үд»¶еӨ№гҖ?/p>
                </div>

            </div>
        </div>
    </main>

    <script src="/js/common.js"></script>
    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const submitBtn = document.getElementById('submitBtn');
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'еҸ‘йҖҒдёӯ...';
            
            try {
                const res = await fetch('/api/password/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    document.getElementById('forgotForm').style.display = 'none';
                    document.getElementById('successMessage').style.display = 'block';
                } else {
                    showToast(data.error || 'еҸ‘йҖҒеӨұиҙ?, 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'еҸ‘йҖҒйҮҚзҪ®йӮ®д»?;
                }
            } catch (err) {
                showToast('зҪ‘з»ңй”ҷиҜҜ', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'еҸ‘йҖҒйҮҚзҪ®йӮ®д»?;
            }
        });
    </script>
